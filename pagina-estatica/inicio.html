<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>A PASO FIRME</title>

    <style>

        body {
            margin: 0;
            font-family: Arial;
            color: black;
            background: linear-gradient(rgba(255,255,255,0.6),rgba(255,255,255,0.6)),url("img/fondo.jpg");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        /* HEADER */

        .header {
            background: black;
            color: white;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 30px;
            padding: 20px 60px;
        }

        .logo-header {
            width: 170px;
            height: auto;
        }

        .header-text h1 {
            margin: 0;
            font-size: 40px;
            letter-spacing: 3px;
        }

        /* MENU */

        nav {
            background: #111;
            padding: 15px;
            text-align: center;
        }

            nav a {
                color: white;
                margin: 20px;
                text-decoration: none;
                font-weight: bold;
            }

                nav a:hover {
                    color: #aaa;
                }

        /* MARCAS */

        .marcas {
            max-width: 1000px;
            margin: auto;
            padding: 60px;
            display: grid;
            grid-template-columns: repeat(auto-fit,minmax(200px,1fr));
            gap: 40px;
            text-align: center;
        }

            .marcas img {
                width: 100%;
                max-width: 150px;
                filter: grayscale(100%);
                transition: 0.3s;
            }

                .marcas img:hover {
                    filter: none;
                    transform: scale(1.1);
                }

        /* IMAGEN INICIO */

        .imagen-inicio {
            text-align: center;
            margin-top: 20px;
        }

            .imagen-inicio img {
                width: 90%;
                max-width: 900px;
                border-radius: 10px;
            }

        /* FOOTER */

        footer {
            background: black;
            color: white;
            text-align: center;
            padding: 30px;
        }
    </style>

</head>

<body>

    <header class="header">

        <img src="img/logo.png" class="logo-header">

        <div class="header-text">
            <h1>A PASO FIRME</h1>
        </div>

    </header>

    <nav>

        <a href="inicio.html">Inicio</a>
        <a href="index.html">Zapatillas</a>
        <a href="comprar.html">Cómo comprar</a>
        <a href="envios.html">Envíos</a>

    </nav>

    <section class="marcas">

        <a href="index.html">
            <img src="img/nike.png">
        </a>

        <a href="index.html">
            <img src="img/adidas.png">
        </a>

        <a href="index.html">
            <img src="img/vans.png">
        </a>

        <a href="index.html">
            <img src="img/dc.png">
        </a>

    </section>

    <footer>



        <div class="imagen-inicio">
            <img src="img/inicio.jpg">
        </div>

    </footer>

</body>
</html>
